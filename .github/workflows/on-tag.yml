name: On tag push

on:
  push:
    tags:
      - '*'

jobs:
  large-test:
    uses: ./.github/workflows/job-test-large.yml
  build:
    needs:
      - large-test
    uses: ./.github/workflows/job-build.yml
  release:
    needs:
      - build
    permissions:
      contents: write
    uses: ./.github/workflows/job-release.yml
